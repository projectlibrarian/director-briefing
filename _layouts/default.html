<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{ page.title }}</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.6;
      color: #222;
    }

    header {
      margin-bottom: 24px;
    }

    img.logo {
      max-height: 70px;
    }

    h1 {
      margin-top: 0;
    }

    a {
      color: #005a9c;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <header>
    <a href="{{ '/' | relative_url }}">
      <img class="logo" src="https://owwl.org/wp-content/uploads/2022/12/OWWL_Logo-Hi_Res-Fill-1024x495.png" alt="Logo">
    </a>
  </header>

  <main>
    {{ content }}
  </main>

</body>
</html>
