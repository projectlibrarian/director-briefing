<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }}</title>

  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Roboto', sans-serif;
      font-size: 18px;
      max-width: 720px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.7;
      color: #333;
    }

    header {
      margin-bottom: 24px;
    }

    img.logo {
      max-height: 90px;
    }

    h1 {
      margin-top: 0;
      font-weight: 500;
    }

    h2 {
      margin-top: 32px;
      margin-bottom: 8px;
      font-weight: 500;
    }

    h3 {
      margin-top: 24px;
      margin-bottom: 8px;
      font-weight: 500;
    }

    p {
      margin: 0 0 16px 0;
    }

    ul,
    ol {
      margin: 0 0 16px 20px;
      padding: 0;
    }

    li {
      margin-bottom: 6px;
    }

    a {
      color: #005a9c;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin: 24px 0;
      font-size: 0.95em;
    }

    th,
    td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background-color: #f7f7f7;
      font-weight: 500;
    }

    blockquote {
      border-left: 5px solid #005a9c;
      background-color: #f5f8fb;
      padding: 12px 16px;
      margin: 24px 0;
      color: #444;
    }

    blockquote p:last-child {
      margin-bottom: 0;
    }

    hr {
      border: none;
      border-top: 1px solid #ddd;
      margin: 32px 0;
    }

    strong {
      font-weight: 500;
    }
  </style>
</head>
<body>

  <header>
    <a href="{{ '/' | relative_url }}">
      <img class="logo" src="https://owwl.org/wp-content/uploads/2022/12/OWWL_Logo-Hi_Res-Fill-1024x495.png" alt="OWWL Logo">
    </a>
  </header>

  <main>
    {{ content }}
  </main>

</body>
</html>
