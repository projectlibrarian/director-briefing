<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }}</title>

  <!-- Load Roboto from Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Roboto', sans-serif;
      font-size: 18px;
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.6;
      color: #222;
    }

    header {
      margin-bottom: 24px;
    }

    img.logo {
      max-height: 90px;
    }

    h1 {
      margin-top: 0;
      font-weight: 500;
    }

    a {
      color: #005a9c;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
    table {
  width: 100%;
  border-collapse: collapse;
  margin: 20px 0;
}

th, td {
  border: 1px solid #ccc;
  padding: 8px 10px;
  text-align: left;
}

th {
  background-color: #f5f5f5;
  font-weight: 500;
}

blockquote {
  border-left: 5px solid #005a9c;
  background-color: #f5f8fb;
  padding: 12px 16px;
  margin: 24px 0;
}
    
  </style>
</head>
<body>

  <header>
    <a href="{{ '/' | relative_url }}">
      <img class="logo" src="https://owwl.org/wp-content/uploads/2022/12/OWWL_Logo-Hi_Res-Fill-1024x495.png" alt="OWWL Logo">
    </a>
  </header>

  <main>
    {{ content }}
  </main>

</body>
</html>
